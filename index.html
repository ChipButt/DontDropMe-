<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#07111f">
    <title>Tap Sphere</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css?v=20260709-2">
    <script src="script.js?v=20260709-2" defer></script>
  </head>
  <body>
    <main class="game-shell" aria-label="Tap Sphere arcade game">
      <canvas id="gameCanvas" aria-label="Game canvas"></canvas>

      <section class="hud" aria-label="Game stats">
        <div class="stat">
          <span class="stat__label">Score</span>
          <span id="scoreValue" class="stat__value">0</span>
        </div>
        <div class="stat">
          <span class="stat__label">Best</span>
          <span id="bestValue" class="stat__value">0</span>
        </div>
        <div class="stat">
          <span class="stat__label">Hits</span>
          <span id="hitsValue" class="stat__value">0</span>
        </div>
        <div class="stat">
          <span class="stat__label">Size</span>
          <span id="sizeValue" class="stat__value">64px</span>
        </div>
      </section>

      <section id="startScreen" class="screen" aria-label="Start screen">
        <div class="screen__content">
          <h1>Tap Sphere</h1>
          <p>Tap to Start</p>
        </div>
      </section>

      <section id="gameOverScreen" class="screen screen--hidden" aria-label="Game over screen">
        <div class="screen__content screen__content--panel">
          <h2>Game Over</h2>
          <dl class="results">
            <div>
              <dt>Final score</dt>
              <dd id="finalScoreValue">0</dd>
            </div>
            <div>
              <dt>Best score</dt>
              <dd id="finalBestValue">0</dd>
            </div>
            <div>
              <dt>Total hits</dt>
              <dd id="finalHitsValue">0</dd>
            </div>
            <div>
              <dt>Smallest size</dt>
              <dd id="smallestSizeValue">64px</dd>
            </div>
          </dl>
          <button id="restartButton" class="restart-button" type="button">Restart</button>
        </div>
      </section>
    </main>
  </body>
</html>
